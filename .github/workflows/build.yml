name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Unzip and Build
        run: |
          unzip wealthtrack.zip -d project
          cd project
          ls -la
          SUBDIR=$(find . -name "gradlew" | head -1 | xargs dirname)
          echo "Found at: $SUBDIR"
          cd $SUBDIR
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WealthTrack-APK
          path: "**/**/apk/debug/*.apk"

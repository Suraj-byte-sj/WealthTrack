name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Unzip and find project
        run: |
          unzip wealthtrack.zip -d project
          echo "=== Root contents ==="
          ls -la project/
          echo "=== Looking for gradlew ==="
          find project -name "gradlew" -type f

      - name: Build APK
        run: |
          GRADLEW=$(find project -name "gradlew" -type f | head -1)
          PROJECT_DIR=$(dirname $GRADLEW)
          echo "Found gradlew at: $GRADLEW"
          echo "Project dir: $PROJECT_DIR"
          chmod +x $GRADLEW
          cd $PROJECT_DIR
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WealthTrack-APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
